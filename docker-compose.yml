services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flights
      POSTGRES_USER: flight_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flight_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight_user -d flights"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    profiles: [full]
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://flight_user:${DB_PASSWORD:-flight_pass}@db:5432/flights
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    volumes:
      # /api/monitor/system 디스크 지표용 — 호스트 루트를 읽기전용 마운트(컨테이너
      # overlay fs가 아닌 실제 호스트 디스크 사용량을 보기 위함). CPU/메모리는 /proc로 충분.
      - /:/hostfs:ro
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # python:3.11-slim 베이스에 curl/wget 없음 → 표준 라이브러리 사용
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/config', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    # collect 전용: full에 넣으면 배포(--profile full up -d)가 main.py를 flock 우회로
    # 자동 실행해 cron run과 중첩된다. 수집은 cron 래퍼(run --rm collector)로만 실행.
    profiles: [collect]
    environment:
      DATABASE_URL: postgresql://flight_user:${DB_PASSWORD:-flight_pass}@db:5432/flights
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    profiles: [full]
    expose:
      - "8001"
    environment:
      DATABASE_URL: postgresql://flight_user:${DB_PASSWORD:-flight_pass}@db:5432/flights
    env_file:
      - .env
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # FastMCP SSE 서버는 GET /sse 가 hang 하므로 TCP 연결 확인만 수행
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8001), 5).close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: [full]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
    depends_on:
      - app
      - mcp
    healthcheck:
      # Caddy admin API (컨테이너 내부 전용 포트 2019).
      # admin 은 127.0.0.1:2019 (IPv4 전용) 에 바인딩되는데, 기존 healthcheck 가
      # `localhost` 로 붙으면 busybox wget 이 ::1(IPv6) 로 시도해 connection refused →
      # caddy 는 정상인데 영구 unhealthy 였다. 127.0.0.1 로 명시해 IPv4 로 직접 붙는다.
      # (-O /dev/null = GET 후 본문 버림)
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  frontend:
  backend:

volumes:
  pgdata:
  caddy_data:
  caddy_config:
