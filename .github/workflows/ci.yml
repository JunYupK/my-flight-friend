name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flights
          POSTGRES_USER: flight_user
          POSTGRES_PASSWORD: flight_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (without crawl4ai)
        run: pip install $(grep -v 'crawl4ai' requirements.txt | tr '\n' ' ') pytest

      - name: Run tests
        env:
          DATABASE_URL: postgresql://flight_user:flight_pass@localhost:5432/flights
        run: pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flight_front/web/package-lock.json

      - name: Install & build
        working-directory: flight_front/web
        run: |
          npm ci
          npm run build
