name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

# 동시 배포 직렬화 (진행 중인 배포는 중단하지 않음)
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            set -eo pipefail
            cd ~/my-flight-friend

            git pull origin master

            # 롤백 포인트: 현재 가동 중인 app/mcp 이미지를 :prev 로 태깅.
            # (docker image prune -f 는 dangling 만 제거하므로 태그가 살아남는다)
            # 수동 롤백:
            #   docker tag flight-friend-app:prev my-flight-friend-app:latest
            #   docker compose --profile full up -d app
            APP_ID=$(docker compose --profile full images -q app 2>/dev/null | head -1 || true)
            [ -n "$APP_ID" ] && docker tag "$APP_ID" flight-friend-app:prev || true
            MCP_ID=$(docker compose --profile full images -q mcp 2>/dev/null | head -1 || true)
            [ -n "$MCP_ID" ] && docker tag "$MCP_ID" flight-friend-mcp:prev || true

            # app + mcp 이미지 리빌드 (collector 는 헬스체크 이후 별도 빌드)
            docker compose --profile full build app mcp

            # 무중단 재시작 (caddy 포함 풀스택)
            docker compose --profile full up -d

            # 1) app 이 컨테이너 내부에서 실제로 :8000 을 열었는지 직접 확인.
            #    기존엔 Caddy 경유 curl 로만 판정했는데, app 재생성으로 IP 가 바뀌면
            #    Caddy 가 새 IP 로 재해석하는 데 시간이 걸려 app 이 멀쩡해도 헬스체크
            #    창이 끝나 '거짓 실패' 가 났다. app 포트를 직접 찔러 Caddy 레이스와 분리.
            echo "Waiting for app to listen on :8000 (direct, bypassing Caddy)..."
            for i in $(seq 1 40); do
              if docker compose --profile full exec -T app \
                  python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/config', timeout=5)" >/dev/null 2>&1; then
                echo "app ready (attempt $i)"
                break
              fi
              if [ "$i" -eq 40 ]; then
                echo "app failed to become ready"
                docker compose --profile full logs --tail=80 app
                exit 1
              fi
              sleep 3
            done

            # 2) app/mcp 가 새 IP 를 받았을 수 있으므로 Caddy 를 재시작해 upstream 재해석.
            #    이게 빠지면 Caddy 가 죽은 옛 IP 를 물고 있어 502 가 지속된다(지금까지
            #    수동 restart 로 풀던 현상). restart 시 caddy 가 upstream 을 다시 DNS 해석한다.
            echo "Restarting caddy to re-resolve upstreams..."
            docker compose --profile full restart caddy

            # 3) 최종 end-to-end 스모크 (도메인 경유). Caddyfile site block 이 `{$DOMAIN}`
            #    에만 매칭되므로 .env 의 DOMAIN 을 읽어 --resolve 로 DNS+SNI+Host 를 실제
            #    도메인에 핀하되 연결만 127.0.0.1 로 보낸다.
            DOMAIN=$(grep -E '^DOMAIN=' .env 2>/dev/null | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'")
            : "${DOMAIN:=flight-friend.com}"
            echo "End-to-end health check: https://${DOMAIN} (via --resolve to 127.0.0.1)"
            for i in $(seq 1 20); do
              if curl -fsSk --max-time 5 \
                  --resolve "${DOMAIN}:443:127.0.0.1" \
                  "https://${DOMAIN}/api/config" > /dev/null 2>&1; then
                echo "App end-to-end OK (attempt $i)"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "App end-to-end check failed after 20 attempts"
                docker compose --profile full logs --tail=80 app caddy
                exit 1
              fi
              sleep 2
            done

            # MCP: Caddy auth guard 가 Bearer 토큰 없는 요청에 401 반환하면 정상.
            # SSE 엔드포인트 hang 방지 위해 --max-time 필수.
            for i in $(seq 1 20); do
              code=$(curl -sk --max-time 5 \
                  --resolve "${DOMAIN}:443:127.0.0.1" \
                  -o /dev/null -w "%{http_code}" \
                  "https://${DOMAIN}/mcp/sse" || echo "000")
              if [ "$code" = "200" ] || [ "$code" = "401" ]; then
                echo "MCP deploy OK (attempt $i, code=$code)"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "MCP health check failed after 20 attempts (last code=$code)"
                docker compose --profile full logs --tail=80 mcp caddy
                exit 1
              fi
              sleep 2
            done

            # collector 이미지 빌드 — playwright install --with-deps chromium 이
            # ARM64 에서 캐시 미스 시 10분+ 소요되므로 헬스체크 이후로 분리.
            # 단, 빌드 실패 시 set -e 로 워크플로 전체가 실패한다 (cron 이 stale
            # 이미지를 계속 쓰는 상황을 조용히 넘기지 않기 위함).
            echo "Building collector image (failure fails this workflow)"
            docker compose --profile collect build collector

            # 미사용 이미지 정리
            docker image prune -f
