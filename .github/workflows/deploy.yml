name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/my-flight-friend

            git pull origin master

            # app + mcp + collector 이미지 리빌드
            docker compose -f docker-compose.prod.yml build app mcp collector

            # 무중단 재시작
            docker compose -f docker-compose.prod.yml up -d app mcp

            # 헬스체크 (Caddy 경유)
            sleep 5
            curl -sf http://localhost/api/config > /dev/null \
              && echo "App deploy OK" \
              || (echo "App health check failed" && exit 1)

            curl -sf -o /dev/null -w "%{http_code}" http://localhost/mcp/sse \
              | grep -qE "^(200|401)$" \
              && echo "MCP deploy OK" \
              || (echo "MCP health check failed" && exit 1)

            # 미사용 이미지 정리
            docker image prune -f
