name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -eo pipefail
            cd ~/my-flight-friend

            git pull origin master

            # app + mcp 이미지 리빌드 (collector 는 헬스체크 이후 별도 빌드)
            docker compose --profile full build app mcp

            # 무중단 재시작 (caddy 포함 풀스택)
            docker compose --profile full up -d

            # 헬스체크: Caddyfile 의 site block 이 `{$DOMAIN}` 에만 매칭되므로
            # `https://localhost` 로 찌르면 vhost 매칭 실패로 app 까지 도달조차 못 함.
            # `.env` 의 DOMAIN 을 읽어 curl --resolve 로 DNS+SNI+Host 를 실제
            # 도메인에 핀하되 연결만 127.0.0.1 로 보내 Caddy 가 정상 라우팅하도록 한다.
            # `docker compose up` 직후 Caddy upstream 재바인딩 race 가 있어 retry.
            DOMAIN=$(grep -E '^DOMAIN=' .env 2>/dev/null | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'")
            : "${DOMAIN:=flight-friend.com}"
            echo "Health check target: https://${DOMAIN} (via --resolve to 127.0.0.1)"

            for i in $(seq 1 30); do
              if curl -fsSk --max-time 5 \
                  --resolve "${DOMAIN}:443:127.0.0.1" \
                  "https://${DOMAIN}/api/config" > /dev/null 2>&1; then
                echo "App deploy OK (attempt $i)"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "App health check failed after 30 attempts"
                docker compose --profile full logs --tail=80 app caddy
                exit 1
              fi
              sleep 2
            done

            # MCP: Caddy auth guard 가 Bearer 토큰 없는 요청에 401 반환하면 정상.
            # SSE 엔드포인트 hang 방지 위해 --max-time 필수.
            for i in $(seq 1 30); do
              code=$(curl -sk --max-time 5 \
                  --resolve "${DOMAIN}:443:127.0.0.1" \
                  -o /dev/null -w "%{http_code}" \
                  "https://${DOMAIN}/mcp/sse" || echo "000")
              if [ "$code" = "200" ] || [ "$code" = "401" ]; then
                echo "MCP deploy OK (attempt $i, code=$code)"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "MCP health check failed after 30 attempts (last code=$code)"
                docker compose --profile full logs --tail=80 mcp caddy
                exit 1
              fi
              sleep 2
            done

            # collector 이미지 빌드 (cron 전용, 배포 성공 판정에 영향 없음)
            # playwright install --with-deps chromium 이 ARM64 에서 캐시 미스 시
            # 10분+ 소요되므로 헬스체크 이후로 분리.
            docker compose --profile collect build collector

            # 미사용 이미지 정리
            docker image prune -f
